<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exámenes y Trabajos - 2ºESO A</title>
    <!-- Agregar enlace al archivo de estilos de Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin-top: 60px; /* Añadir margen superior */
            background-color: #333; /* Cambiar a modo oscuro */
            color: white; /* Cambiar color de texto a blanco */
        }
        #trabajos-eventos-lista {
            margin-top: 20px; /* Añadir margen entre las dos listas */
        }
        .list-group-item {
            background-color: #222; /* Cambiar color de fondo de los elementos de la lista a un tono más oscuro */
            border-color: #222; /* Cambiar color del borde de los elementos de la lista a un tono más oscuro */
        }
        footer {
            margin-top: 20px; /* Añadir margen superior al footer */
            text-align: center; /* Centrar texto en el footer */
            color: #aaa; /* Color de texto del footer */
        }
        .second-header {
            margin-top: 40px; /* Añadir margen superior al segundo encabezado */
        }
        header .left-text {
            float: left; /* Hacer que el texto a la izquierda flote a la izquierda */
            text-align: left; /* Alinear texto a la izquierda */
            margin-left: 20px; /* Añadir margen izquierdo al texto a la izquierda */
			margin-top: -45px; /* Añadir margen izquierdo al texto a la izquierda */
			color: #aaa;
        }
    </style>
</head>
<body>
    <header>
        <div class="left-text">Exámenes y Trabajos - 2ºESO A</div>
    </header>

    <div class="container">
        <h1>📄 Exámenes</h1>
        <ul id="examenes-lista" class="list-group"></ul>

        <h1 class="second-header">💼 Trabajos</h1>
        <ul id="trabajos-eventos-lista" class="list-group"></ul>
    </div>

    <footer>
        Héctor Del Pino y Pablo Barrionuevo
    </footer>

    <script>
        // Función para cargar y mostrar las entradas de la tabla examenes
        async function cargarExamenes() {
            try {
                const response = await fetch('http://hexpserver.ddns.net:3330/entradas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ tabla: 'examenes' })
                });
                const data = await response.json();

                const examenesLista = document.getElementById('examenes-lista');
                examenesLista.innerHTML = '';

                data.entradas.forEach(entrada => {
                    const listItem = document.createElement('li');
                    listItem.textContent = entrada.nombre;
                    listItem.classList.add('list-group-item');
                    examenesLista.appendChild(listItem);
                });
            } catch (error) {
                console.error('Error al cargar los exámenes:', error);
            }
        }

        // Función para cargar y mostrar las entradas de la tabla trabajos_eventos
        async function cargarTrabajosEventos() {
            try {
                const response = await fetch('http://hexpserver.ddns.net:3330/entradas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ tabla: 'trabajos_eventos' })
                });
                const data = await response.json();

                const trabajosEventosLista = document.getElementById('trabajos-eventos-lista');
                trabajosEventosLista.innerHTML = '';

                data.entradas.forEach(entrada => {
                    const listItem = document.createElement('li');
                    listItem.textContent = entrada.nombre;
                    listItem.classList.add('list-group-item');
                    trabajosEventosLista.appendChild(listItem);
                });
            } catch (error) {
                console.error('Error al cargar los trabajos/eventos:', error);
            }
        }

        // Llamar a las funciones para cargar los exámenes y los trabajos/eventos cuando la página se cargue
        window.onload = function() {
            cargarExamenes();
            cargarTrabajosEventos();
        };
    </script>
</body>
</html>
